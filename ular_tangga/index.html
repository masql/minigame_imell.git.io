<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ladder Mobile Fix | Bayu Julianto</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; color: white; touch-action: none; }
        
        #player-selection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .selection-box { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #9d50bb; max-width: 85%; }
        .select-btn { margin: 8px 0; padding: 12px 20px; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; max-width: 280px; transition: 0.3s; box-sizing: border-box;}
        .btn-p1 { background: #3498db; color: white; }
        .btn-p2 { background: #2ecc71; color: white; }

        #ui { padding: 8px 5px; text-align: center; z-index: 100; width: 100%; background: rgba(0,0,0,0.9); position: fixed; top: 0; left: 0; border-bottom: 1px solid #333; display: none; }
        .status { font-size: 14px; color: #a3ff00; font-weight: 800; margin-bottom: 5px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .dice-container { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        #dice-visual { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-roll { background: #9d50bb; color: white; padding: 8px 15px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; font-size: 0.75rem; }
        .btn-reset { background: #ff4757; color: white; padding: 8px 12px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; font-size: 0.75rem; }
        .btn-roll:disabled, .btn-reset:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Jarak untuk UI atas agar papan tidak tertutup */
        #game-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 60px; box-sizing: border-box;}
        
        canvas { touch-action: none; display: block; border-radius: 5px;}
        
        .dice-shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% {transform: rotate(0deg)} 50% {transform: rotate(10deg)} 100% {transform: rotate(0deg)} }
    </style>
</head>
<body>

    <div id="player-selection">
        <div class="selection-box">
            <h2 style="color: #9d50bb; margin-bottom: 15px; font-size: 1.3rem;">MASQL SNL HUB</h2>
            <button class="select-btn btn-p1" onclick="choosePlayer('p1')">P1 (BIRU)</button><br>
            <button class="select-btn btn-p2" onclick="choosePlayer('p2')">P2 (HIJAU)</button>
        </div>
    </div>

    <div id="ui">
        <div id="status-info" class="status">Menghubungkan...</div>
        <div class="dice-container">
            <div id="dice-visual">?</div>
            <button class="btn-roll" id="roll-btn" onclick="handleRoll()" disabled>🎲 KOCOK</button>
            <button class="btn-reset" id="reset-btn" onclick="resetGame()">RESET</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAzBk3CcGE3at5iSo5E8z2wykTVvwCZakk",
            authDomain: "flutter-ai-playground-9f4f1.firebaseapp.com",
            databaseURL: "https://flutter-ai-playground-9f4f1-default-rtdb.firebaseio.com",
            projectId: "flutter-ai-playground-9f4f1",
            storageBucket: "flutter-ai-playground-9f4f1.firebasestorage.app",
            messagingSenderId: "127680501471",
            appId: "1:127680501471:web:57a729398001de686c7b6a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // KOORDINAT PAPAN (pada ukuran virtual 1000x1000)
        const originalTiles = [
            {x:57,y:935},{x:159,y:935},{x:257,y:935},{x:335,y:935},{x:440,y:935},{x:546,y:935},{x:640,y:935},{x:750,y:935},{x:838,y:935},{x:929,y:935},
            {x:931,y:834},{x:835,y:834},{x:739,y:834},{x:642,y:834},{x:546,y:834},{x:445,y:834},{x:353,y:834},{x:253,y:834},{x:157,y:834},{x:68,y:834},
            {x:69,y:742},{x:168,y:742},{x:256,y:742},{x:355,y:742},{x:448,y:742},{x:547,y:742},{x:640,y:742},{x:736,y:742},{x:834,y:742},{x:923,y:742},
            {x:928,y:645},{x:837,y:645},{x:737,y:645},{x:642,y:645},{x:549,y:645},{x:448,y:645},{x:356,y:645},{x:260,y:645},{x:164,y:645},{x:73,y:645},
            {x:74,y:551},{x:164,y:551},{x:262,y:551},{x:355,y:551},{x:448,y:551},{x:546,y:551},{x:642,y:551},{x:738,y:551},{x:834,y:551},{x:927,y:551},
            {x:929,y:452},{x:835,y:452},{x:736,y:452},{x:638,y:452},{x:546,y:452},{x:453,y:452},{x:352,y:452},{x:259,y:452},{x:163,y:452},{x:65,y:452},
            {x:72,y:355},{x:164,y:355},{x:262,y:355},{x:354,y:355},{x:450,y:355},{x:546,y:355},{x:642,y:355},{x:732,y:355},{x:836,y:355},{x:915,y:355},
            {x:926,y:268},{x:835,y:268},{x:739,y:268},{x:644,y:268},{x:550,y:268},{x:449,y:268},{x:352,y:268},{x:262,y:268},{x:163,y:268},{x:68,y:268},
            {x:68,y:167},{x:167,y:167},{x:263,y:167},{x:355,y:167},{x:450,y:167},{x:549,y:167},{x:642,y:167},{x:734,y:167},{x:835,y:167},{x:928,y:167},
            {x:934,y:68},{x:837,y:68},{x:738,y:68},{x:645,y:68},{x:537,y:68},{x:446,y:68},{x:358,y:68},{x:260,y:68},{x:164,y:68},{x:72,y:68}
        ];

        const traps = { 29: 6, 46: 12, 55: 18, 72: 50, 81: 41, 91: 74, 97: 54, 3: 24, 20: 38, 25: 66, 42: 75, 58: 80, 70: 88 };

        let myRole = ""; 
        let currentTurn = "p1";
        let isBusy = false;
        let p1_sprite, p2_sprite;
        let positions = { p1: 0, p2: 0 };
        let visualScale = 1; // Faktor skala untuk koordinat

        function choosePlayer(role) {
            myRole = role;
            document.getElementById('player-selection').style.display = "none";
            document.getElementById('ui').style.display = "block";
            startSync();
        }

        // Hitung dimensi game secara responsif
        const calculateGameSize = () => {
            const container = document.getElementById('game-container');
            const style = window.getComputedStyle(container);
            const w = parseInt(style.width, 10);
            const h = parseInt(style.height, 10);
            const size = Math.min(w, h * 0.95); // Sedikit margin bawah
            visualScale = size / 1000; // Hitung faktor skala (asumsi papan asli 1000x1000)
            return { width: size, height: size };
        };

        const initialSize = calculateGameSize();

        // --- PHASER GAME CONFIG ---
        const gameConfig = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: initialSize.width,
            height: initialSize.height,
            transparent: true,
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(gameConfig);

        function preload() {
            this.load.image('papan', 'papan_1.png');
            this.load.image('p1_asset', 'asset_player1.png');
            this.load.image('p2_asset', 'asset_player2.png');
        }

        function create() {
            // Skala kanvas untuk muat di layar
            const boardCenter = initialSize.width / 2;
            
            // Tambahkan papan yang sudah diskala
            const papan = this.add.image(boardCenter, boardCenter, 'papan');
            papan.setDisplaySize(initialSize.width, initialSize.width);

            // Tambahkan player (skala disesuaikan faktor skala visual)
            const pawnSize = 0.28 * visualScale;
            p1_sprite = this.add.sprite(tiles(0).x, tiles(0).y, 'p1_asset').setScale(pawnSize).setDepth(10);
            p2_sprite = this.add.sprite(tiles(0).x, tiles(0).y, 'p2_asset').setScale(pawnSize).setDepth(10).setTint(0x00ff00);
            
            // Posisi awal visual
            updatePawnPosition('p1', 0);
            updatePawnPosition('p2', 0);
        }

        // Fungsi Helper untuk koordinat proporsional
        function tiles(index) {
            if(!originalTiles[index]) return {x: 0, y:0};
            return {
                x: originalTiles[index].x * visualScale,
                y: originalTiles[index].y * visualScale
            };
        }

        // --- FIREBASE SYNC ---
        function startSync() {
            db.ref('game_session/turn').on('value', snap => {
                currentTurn = snap.val() || "p1";
                updateUI();
            });

            db.ref('game_session/move_event').on('value', snap => {
                const data = snap.val();
                if (!data || data.role === myRole) return; 
                
                isBusy = true;
                animatePawn(data.role, data.from, data.to, () => {
                    if(data.final !== data.to) {
                        setTimeout(() => animateJump(data.role, data.final, () => isBusy = false), 500);
                    } else { isBusy = false; }
                    updateUI();
                });
            });

            db.ref('game_session').on('value', snap => {
                const data = snap.val();
                if (data && !isBusy) {
                    positions.p1 = data.p1_pos || 0;
                    positions.p2 = data.p2_pos || 0;
                    if(p1_sprite && p2_sprite) {
                        updatePawnPosition('p1', positions.p1);
                        updatePawnPosition('p2', positions.p2);
                    }
                }
            });
        }

        function updateUI() {
            const btn = document.getElementById('roll-btn');
            const info = document.getElementById('status-info');
            if (currentTurn === myRole && !isBusy) {
                btn.disabled = false;
                info.innerText = "GILIRAN KAMU!";
                info.style.color = "#a3ff00";
            } else {
                btn.disabled = true;
                info.innerText = isBusy ? "BERGERAK..." : `GILIRAN ${currentTurn.toUpperCase()}`;
                info.style.color = "#ff4757";
            }
        }

        function handleRoll() {
            if (isBusy) return;
            isBusy = true;
            updateUI();

            const dice = document.getElementById('dice-visual');
            dice.classList.add('dice-shake');

            let counter = 0;
            const interval = setInterval(() => {
                dice.innerText = Math.floor(Math.random() * 6) + 1;
                if (++counter > 10) {
                    clearInterval(interval);
                    dice.classList.remove('dice-shake');
                    const roll = Math.floor(Math.random() * 6) + 1;
                    dice.innerText = roll;
                    processMove(roll);
                }
            }, 100);
        }

        function processMove(roll) {
            const start = positions[myRole];
            let target = Math.min(start + roll, 99);
            const final = traps[target] !== undefined ? traps[target] : target;

            db.ref('game_session/move_event').set({
                role: myRole, from: start, to: target, final: final, ts: Date.now()
            });

            animatePawn(myRole, start, target, () => {
                if (final !== target) {
                    setTimeout(() => animateJump(myRole, final, () => finalize(final)), 600);
                } else {
                    finalize(final);
                }
            });
        }

        function updatePawnPosition(role, tileIndex) {
            const sprite = (role === "p1") ? p1_sprite : p2_sprite;
            if(sprite) sprite.setPosition(tiles(tileIndex).x, tiles(tileIndex).y);
        }

        function animatePawn(role, start, end, cb) {
            const sprite = (role === "p1") ? p1_sprite : p2_sprite;
            const scene = game.scene.scenes[0];
            let current = start;
            
            const step = () => {
                if (current < end) {
                    current++;
                    const nextCoord = tiles(current);
                    scene.tweens.add({
                        targets: sprite,
                        x: nextCoord.x,
                        y: nextCoord.y,
                        duration: 250,
                        onComplete: step
                    });
                } else { if(cb) cb(); }
            };
            step();
        }

        function animateJump(role, final, cb) {
            const sprite = (role === "p1") ? p1_sprite : p2_sprite;
            const finalCoord = tiles(final);
            game.scene.scenes[0].tweens.add({
                targets: sprite,
                x: finalCoord.x,
                y: finalCoord.y,
                duration: 700,
                ease: 'Back.easeOut',
                onComplete: cb
            });
        }

        function finalize(pos) {
            const next = (myRole === "p1") ? "p2" : "p1";
            db.ref('game_session').update({
                [`${myRole}_pos`]: pos, turn: next, move_event: null
            }).then(() => {
                isBusy = false;
                updateUI();
                if (pos === 99) alert("KAMU MENANG!");
            });
        }

        function resetGame() {
            if(!confirm("Reset permainan?")) return;
            db.ref('game_session').set({
                p1_pos: 0, p2_pos: 0, turn: "p1", move_event: null
            });
            document.getElementById('dice-visual').innerText = "?";
        }
    </script>
</body>
</html>
